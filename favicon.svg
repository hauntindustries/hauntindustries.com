<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" aria-hidden="true">
  <defs>
    <linearGradient id="lit" x1="0" y1="0" x2="0.8" y2="1">
      <stop offset="0%"   stop-color="#FBE9E2"/>
      <stop offset="35%"  stop-color="#EFC6B7"/>
      <stop offset="100%" stop-color="#A87968"/>
    </linearGradient>
    <linearGradient id="shadow" x1="1" y1="0" x2="0.2" y2="1">
      <stop offset="0%"   stop-color="#C68A78"/>
      <stop offset="100%" stop-color="#5A3329"/>
    </linearGradient>
  </defs>

  <!-- H for Haunt: two struck-metal uprights; the crossbar floats free of both. -->
  <rect x="6"    y="4"  width="4.5" height="24" fill="url(#lit)"/>
  <rect x="21.5" y="4"  width="4.5" height="24" fill="url(#shadow)"/>
  <rect x="13"   y="14" width="6"   height="4"  fill="#E0A89A" fill-opacity="0.72"/>
</svg>
